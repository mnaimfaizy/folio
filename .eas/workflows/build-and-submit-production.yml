name: Build and Submit Production

on:
  workflow_dispatch:

jobs:
  build_android:
    name: Build Android (production)
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production

  submit_android:
    name: Submit Android
    type: submit
    needs: [build_android]
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production

  submit_ios:
    name: Submit iOS
    type: submit
    needs: [build_ios]
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  next_steps:
    name: Post-submit notes
    type: doc
    after: [submit_android, submit_ios]
    params:
      md: |
        ## Mobile submission completed

        Check platform dashboards to continue release rollout:

        - Google Play Console (tracks/release rollout)
        - App Store Connect / TestFlight (processing/release)
