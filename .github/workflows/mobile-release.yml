name: Mobile Release (EAS)

on:
    workflow_dispatch:
        inputs:
            platform:
                description: Target platform
                required: true
                type: choice
                default: all
                options:
                    - all
                    - android
                    - ios
            profile:
                description: EAS build profile
                required: true
                type: choice
                default: production
                options:
                    - production
                    - preview
                    - development
            submit:
                description: Submit to store after build
                required: true
                type: boolean
                default: false
            run_mobile_tests:
                description: Run mobile tests before release
                required: true
                type: boolean
                default: true

permissions:
    contents: read

concurrency:
    group: mobile-release-${{ github.ref }}
    cancel-in-progress: false

env:
    CI: true
    NX_DAEMON: false
    NX_TUI: false

jobs:
    validate:
        name: Validate mobile project
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: yarn

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Run mobile tests
              if: inputs.run_mobile_tests
              run: yarn nx test mobile

    release:
        name: Build and optional submit
        runs-on: ubuntu-latest
        needs: validate
        env:
            EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: yarn

            - name: Setup Expo and EAS CLI
              uses: expo/expo-github-action@v8
              with:
                  eas-version: latest
                  token: ${{ secrets.EXPO_TOKEN }}

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Verify EXPO_TOKEN
              run: |
                  if [ -z "$EXPO_TOKEN" ]; then
                    echo "EXPO_TOKEN is not configured. Add it in GitHub repository secrets."
                    exit 1
                  fi

            - name: Build Android
              if: inputs.platform == 'all' || inputs.platform == 'android'
              run: yarn nx run mobile:build --platform android --profile ${{ inputs.profile }} --non-interactive

            - name: Build iOS
              if: inputs.platform == 'all' || inputs.platform == 'ios'
              run: yarn nx run mobile:build --platform ios --profile ${{ inputs.profile }} --non-interactive

            - name: Submit Android
              if: inputs.submit && (inputs.platform == 'all' || inputs.platform == 'android')
              run: yarn nx run mobile:submit --platform android --profile ${{ inputs.profile }}

            - name: Submit iOS
              if: inputs.submit && (inputs.platform == 'all' || inputs.platform == 'ios')
              run: yarn nx run mobile:submit --platform ios --profile ${{ inputs.profile }}
